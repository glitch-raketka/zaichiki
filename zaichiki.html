<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Иван кинни не вознесутся (эндрю тоже)</title>
    <style>
        body {
            background-color: black; /* Фон сайта черный */
            display: flex; /* Для центрирования */
            justify-content: center; /* Центрируем по горизонтали */
            align-items: center; /* Центрируем по вертикали */
            min-height: 100vh; /* Занимаем всю высоту экрана */
            margin: 0; /* Убираем отступы */
            overflow: hidden; /* Если вдруг текст огромный, чтобы не было прокрутки */
        }
        h1 {
            color: red; /* Цвет текста красный */
            font-family: 'Comic Sans MS', cursive; /* Пусть будет "Комик Санс" для угара, чисто мемный шрифт! */
            font-size: 8em; /* Большой размер для надписи */
            text-align: center; /* Центрируем текст */
            text-shadow: 0 0 10px yellow, 0 0 20px lime; /* Для контраста - желто-салатовое свечение! */
            line-height: 1.2; /* Межстрочный интервал, если надпись в несколько строк */
            padding: 20px; /* Немного отступов, чтобы совсем уж не прилипало к краям */
        }
    </style>
</head>
<body>
    <h1>НЕ ЕБИ ЗАЙЦЕВ В РОТ ПОЖАЛУЙСТА</h1>
</body>
</html>
